<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fylio | Descarga APK</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <meta property="og:title" content="fylio | Descarga APK">
    <meta property="og:description" content="Tu buscador y sitio web de descargas de APKs seguro y rápido.">
    <meta property="og:image" content="https://fylio-app.netlify.app/favicon.png">
    <meta property="og:url" content="https://fylio-app.netlify.app/">
    <meta property="og:type" content="website">
    <style>
        
        /* Forzar que por defecto el texto de bienvenida sea negro (Modo Claro) */
        #welcome-text h1, 
        #welcome-text .intro-text {
            color: #000000 !important;
        }

        /* Cuando el cuerpo tenga la clase dark-mode, cambiar a blanco */
        body.dark-mode #welcome-text h1,
        body.dark-mode #welcome-text .intro-text {
            color: #f0f0f0 !important;
        }

        /* Si el sistema del usuario prefiere modo oscuro por defecto (y no se ha forzado el modo claro) */
        @media (prefers-color-scheme: dark) {
            body:not(.light-mode) #welcome-text h1,
            body:not(.light-mode) #welcome-text .intro-text {
                color: #f0f0f0 !important;
            }
        }
    </style>
</head>
<body>

    <div class="animated-background"></div>

    <header>
        <div class="brand-container">
            <button class="icon-btn" onclick="toggleModal('side-menu')">
                <svg viewBox="0 0 24 24">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <span class="brand-name">fylio</span>
        </div>
        <div class="icon-group">
            <button class="icon-btn" onclick="toggleModal('search-modal')">
                <svg viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()">
                <svg id="theme-icon" viewBox="0 0 24 24">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main>
        <div id="welcome-text">
            <h1>Bienvenido</h1>
            <p class="intro-text">Estamos iniciando pero poco a poco añadiremos más apps y archivos para ti</p>
        </div>
        <div id="search-results"></div>
    </main>

    <div id="side-menu" class="overlay" onclick="resetToHome()">
        <div class="modal-box" id="side-menu-content" style="width: 250px;" onclick="event.stopPropagation()">
            <button class="side-btn" onclick="showSupportLoading()">
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                Soporte
            </button>
            <button class="side-btn" onclick="location.reload()">
                <svg viewBox="0 0 24 24">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                    <path d="M3 3v5h5"></path>
                </svg>
                Restablecer
            </button>
        </div>
    </div>

    <div id="search-modal" class="overlay" onclick="resetToHome()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <input type="text" id="search-input" placeholder="Buscar..." value="">
            <div class="buttons">
                <button class="action-btn btn-cancel" onclick="resetToHome()">Cancelar</button>
                <button class="action-btn btn-action" onclick="performSearch()">Buscar</button>
            </div>
        </div>
    </div>

    <div id="loading-screen">
        <div id="loading-image" class="loading-image"></div>
        <h3 id="loading-title" class="loading-title"></h3>
        <p class="loading-text">Preparando enlace...</p>
        
        <div class="circular-loader-container" id="circular-loader">
            <svg>
                <circle class="circle-bg" cx="50" cy="50" r="44"></circle>
                <circle class="circle-progress" id="circle-progress" cx="50" cy="50" r="44"></circle>
            </svg>
            <div class="circle-content">
                <span id="countdown-text">10</span>
                <svg viewBox="0 0 24 24">
                    <path d="M20 6L9 17l-5-5"/>
                </svg>
            </div>
        </div>

        <button id="download-btn" class="download-btn" disabled>
            <svg id="lock-icon" class="lock-icon" viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <span id="btn-text">Loading...</span>
        </button>
    </div>

    <button id="back-button" onclick="resetToHome()">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
    </button>

    <script src="script.js"></script>
</body>
</html>
